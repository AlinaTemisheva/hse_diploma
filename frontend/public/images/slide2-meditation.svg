<svg viewBox="0 0 400 350" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Meditating person with puzzle pieces -->
  
  <!-- Puzzle pieces above head - yellow/lime -->
  <g transform="translate(150, 30)">
    <!-- Puzzle piece 1 -->
    <path d="M20 50 L20 30 Q30 25 30 35 L30 30 L50 30 L50 50 Q40 55 40 45 L40 50 Z" fill="#CCFF00" stroke="#333" stroke-width="1.5"/>
    <!-- Puzzle piece 2 -->
    <path d="M55 30 L55 10 Q65 5 65 15 L65 10 L85 10 L85 30 Q75 35 75 25 L75 30 Z" fill="#CCFF00" stroke="#333" stroke-width="1.5"/>
    <!-- Puzzle piece 3 -->
    <path d="M40 80 L40 60 Q50 55 50 65 L50 60 L70 60 L70 80 Q60 85 60 75 L60 80 Z" fill="#CCFF00" stroke="#333" stroke-width="1.5"/>
    <!-- Puzzle piece 4 -->
    <path d="M70 50 L70 30 Q80 25 80 35 L80 30 L100 30 L100 50 Q90 55 90 45 L90 50 Z" fill="#CCFF00" stroke="#333" stroke-width="1.5"/>
  </g>
  
  <!-- Motion lines -->
  <line x1="135" y1="60" x2="125" y2="50" stroke="#333" stroke-width="1.5"/>
  <line x1="130" y1="75" x2="115" y2="70" stroke="#333" stroke-width="1.5"/>
  <line x1="275" y1="55" x2="290" y2="45" stroke="#333" stroke-width="1.5"/>
  <line x1="280" y1="70" x2="295" y2="65" stroke="#333" stroke-width="1.5"/>
  
  <!-- Head -->
  <ellipse cx="200" cy="155" rx="45" ry="50" fill="white" stroke="#333" stroke-width="2.5"/>
  
  <!-- Hair -->
  <path d="M165 130 Q160 100 185 95 Q195 90 200 95 L200 110 Q180 115 175 130 Z" fill="#333"/>
  <path d="M200 95 Q220 85 235 100 Q245 115 235 130 L235 120 Q225 110 210 115 L200 110 Z" fill="#333"/>
  
  <!-- Eyes closed -->
  <path d="M180 155 Q190 150 200 155" stroke="#333" stroke-width="2" fill="none"/>
  <path d="M200 155 Q210 150 220 155" stroke="#333" stroke-width="2" fill="none"/>
  
  <!-- Smile -->
  <path d="M185 175 Q200 190 215 175" stroke="#333" stroke-width="2" fill="none"/>
  
  <!-- Body/torso -->
  <ellipse cx="200" cy="240" rx="35" ry="30" fill="white" stroke="#333" stroke-width="2.5"/>
  
  <!-- Arms raised -->
  <path d="M165 230 Q130 200 120 160" stroke="#333" stroke-width="2.5" fill="none"/>
  <path d="M235 230 Q270 200 280 160" stroke="#333" stroke-width="2.5" fill="none"/>
  
  <!-- Hands -->
  <ellipse cx="120" cy="155" rx="15" ry="12" fill="white" stroke="#333" stroke-width="2"/>
  <ellipse cx="280" cy="155" rx="15" ry="12" fill="white" stroke="#333" stroke-width="2"/>
  
  <!-- Legs crossed -->
  <path d="M175 260 Q150 280 160 310 Q170 330 200 320" stroke="#333" stroke-width="2.5" fill="none"/>
  <path d="M225 260 Q250 280 240 310 Q230 330 200 320" stroke="#333" stroke-width="2.5" fill="none"/>
  
  <!-- Feet -->
  <ellipse cx="158" cy="315" rx="20" ry="10" fill="white" stroke="#333" stroke-width="2"/>
  <ellipse cx="242" cy="315" rx="20" ry="10" fill="white" stroke="#333" stroke-width="2"/>
</svg>