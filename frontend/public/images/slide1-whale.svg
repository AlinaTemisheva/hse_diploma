<svg viewBox="0 0 350 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Flying person/whale with flag - matching Figma exactly -->
  
  <!-- Cloud bottom left -->
  <g transform="translate(60, 260)">
    <ellipse cx="30" cy="10" rx="35" ry="15" fill="white"/>
    <ellipse cx="15" cy="5" rx="20" ry="12" fill="white"/>
    <ellipse cx="50" cy="8" rx="18" ry="10" fill="white"/>
  </g>
  
  <!-- Cloud top right (small wavy) -->
  <path d="M270 90 Q280 85 290 90 Q300 85 305 92" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Smoke/puff lines top right -->
  <path d="M295 70 Q305 65 300 80" stroke="#333" stroke-width="2" fill="none"/>
  <path d="M305 60 Q315 55 310 72" stroke="#333" stroke-width="2" fill="none"/>
  
  <!-- Bubbles near head -->
  <circle cx="250" cy="130" r="12" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="230" cy="155" r="8" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="265" cy="150" r="6" fill="none" stroke="#333" stroke-width="2"/>
  
  <!-- Flag -->
  <polygon points="110,55 65,25 110,5" fill="#E8FF00" stroke="#333" stroke-width="2.5" stroke-linejoin="round"/>
  
  <!-- Flag pole -->
  <line x1="110" y1="55" x2="155" y2="155" stroke="#333" stroke-width="3"/>
  
  <!-- Main body (whale-like ellipse) -->
  <ellipse cx="190" cy="180" rx="85" ry="50" fill="white" stroke="#333" stroke-width="3"/>
  
  <!-- Hair/head - curly black -->
  <g transform="translate(230, 140)">
    <circle cx="0" cy="0" r="18" fill="#333"/>
    <circle cx="-12" cy="-10" r="12" fill="#333"/>
    <circle cx="12" cy="-8" r="14" fill="#333"/>
    <circle cx="20" cy="5" r="10" fill="#333"/>
    <circle cx="-18" cy="8" r="10" fill="#333"/>
  </g>
  
  <!-- Face - glasses -->
  <circle cx="195" cy="175" r="16" fill="none" stroke="#333" stroke-width="2.5"/>
  <circle cx="193" cy="175" r="5" fill="#333"/>
  
  <!-- Glasses arm -->
  <line x1="211" y1="175" x2="230" y2="165" stroke="#333" stroke-width="2"/>
  
  <!-- Smile/fin at back -->
  <path d="M265 190 Q285 185 295 200" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Arm holding flag -->
  <path d="M160 160 Q140 130 145 110" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Hand circle -->
  <circle cx="150" cy="155" r="10" fill="white" stroke="#333" stroke-width="2.5"/>
  
  <!-- Tail/fins (striped) -->
  <path d="M130 210 Q105 240 90 265" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M145 215 Q125 240 115 260" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M160 218 Q145 235 140 250" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Small decorative lines near flag -->
  <line x1="85" y1="45" x2="75" y2="35" stroke="#333" stroke-width="2"/>
  <line x1="80" y1="55" x2="68" y2="50" stroke="#333" stroke-width="2"/>
</svg>