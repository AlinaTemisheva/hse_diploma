<svg viewBox="0 0 320 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Person with lightbulb idea - matching Figma exactly -->
  
  <!-- Lightbulb -->
  <ellipse cx="145" cy="35" rx="28" ry="35" fill="#E8FF00" stroke="#333" stroke-width="2.5"/>
  <rect x="132" y="65" width="26" height="18" rx="3" fill="#E8FF00" stroke="#333" stroke-width="2"/>
  
  <!-- Lightbulb base lines -->
  <line x1="138" y1="68" x2="138" y2="80" stroke="#333" stroke-width="2"/>
  <line x1="145" y1="68" x2="145" y2="80" stroke="#333" stroke-width="2"/>
  <line x1="152" y1="68" x2="152" y2="80" stroke="#333" stroke-width="2"/>
  
  <!-- Light rays -->
  <line x1="145" y1="-5" x2="145" y2="8" stroke="#333" stroke-width="2"/>
  <line x1="110" y1="15" x2="98" y2="5" stroke="#333" stroke-width="2"/>
  <line x1="180" y1="15" x2="192" y2="5" stroke="#333" stroke-width="2"/>
  <line x1="100" y1="45" x2="85" y2="45" stroke="#333" stroke-width="2"/>
  <line x1="190" y1="45" x2="205" y2="45" stroke="#333" stroke-width="2"/>
  
  <!-- Arm pointing up to lightbulb -->
  <path d="M155 145 Q145 110 145 85" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Pointing finger/hand -->
  <circle cx="145" cy="83" r="10" fill="white" stroke="#333" stroke-width="2.5"/>
  <line x1="145" y1="73" x2="145" y2="65" stroke="#333" stroke-width="2.5"/>
  
  <!-- Head -->
  <ellipse cx="190" cy="155" rx="55" ry="60" fill="white" stroke="#333" stroke-width="3"/>
  
  <!-- Hair (ponytail style) -->
  <path d="M160 105 Q170 75 220 85 Q260 100 255 150 L248 135 Q245 100 210 95 Q175 90 168 115 Z" fill="#333"/>
  
  <!-- Eye (one visible, winking/happy expression) -->
  <circle cx="175" cy="145" r="8" fill="#333"/>
  
  <!-- Open mouth (happy) -->
  <ellipse cx="165" cy="185" rx="25" ry="20" fill="white" stroke="#333" stroke-width="2.5"/>
  <ellipse cx="165" cy="192" rx="15" ry="12" fill="#FFB6C1"/>
  
  <!-- Other arm -->
  <path d="M235 180 Q270 200 265 250" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Body/torso outline -->
  <path d="M175 215 L155 355" stroke="#333" stroke-width="3" fill="none"/>
  <path d="M205 215 L230 355" stroke="#333" stroke-width="3" fill="none"/>
  
  <!-- Pants with polka dots -->
  <path d="M145 235 Q140 280 135 355 L230 355 Q225 280 220 235 Q200 220 175 220 Q155 220 145 235" 
        fill="#CCFF00" stroke="#333" stroke-width="2.5"/>
  
  <!-- Polka dots on pants -->
  <circle cx="165" cy="260" r="8" fill="#A8D900"/>
  <circle cx="195" cy="250" r="10" fill="#A8D900"/>
  <circle cx="210" cy="285" r="7" fill="#A8D900"/>
  <circle cx="170" cy="295" r="9" fill="#A8D900"/>
  <circle cx="200" cy="315" r="8" fill="#A8D900"/>
  <circle cx="160" cy="325" r="7" fill="#A8D900"/>
  <circle cx="185" cy="340" r="9" fill="#A8D900"/>
  <circle cx="220" cy="330" r="6" fill="#A8D900"/>
  
  <!-- Legs divider -->
  <line x1="182" y1="290" x2="182" y2="355" stroke="#333" stroke-width="2"/>
  
  <!-- Feet -->
  <ellipse cx="140" cy="370" rx="28" ry="14" fill="#CCFF00" stroke="#333" stroke-width="2.5"/>
  <ellipse cx="225" cy="370" rx="28" ry="14" fill="#CCFF00" stroke="#333" stroke-width="2.5"/>
</svg>